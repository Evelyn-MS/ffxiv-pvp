<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFXIV Frontline</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #151526, #2c2145, #111827);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      padding: 32px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .label {
      color: #c4b5fd;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 18px;
    }

    .date {
      font-size: 17px;
      margin-bottom: 18px;
      color: #d1d5db;
      font-weight: 600;
    }

    .reset-info {
      font-size: 14px;
      margin-bottom: 24px;
      color: #e5e7eb;
    }

    .battlefield-box {
      background: rgba(0, 0, 0, 0.28);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 22px;
    }

    .subtitle {
      margin-bottom: 4px;
      color: #f3f4f6;
      font-size: 14px;
      font-weight: 600;
    }

    .battlefield-name {
      font-size: 28px;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 18px;
    }

    .next {
      color: #bfdbfe;
      font-size: 15px;
    }

    .maps {
      text-align: left;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 22px;
    }

    .maps h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #ddd6fe;
    }

    .maps ul {
      list-style: none;
      line-height: 1.8;
      color: #f3f4f6;
    }

    .maps li::before {
      content: "•";
      color: #f3f4f6;
      margin-right: 8px;
      font-weight: bold;
    }

    .today-map {
      font-weight: bold;
    }

    footer {
      font-size: 12px;
      color: #c4c4c4;
      line-height: 1.4;
      text-align: left;
      padding: 0 6px;
    }
  </style>
</head>

<body>
  <main class="card">
    <p class="label">Final Fantasy XIV PvP</p>

    <h1>Frontline battlefields</h1>

    <p class="date" id="todayDate"></p>

    <p class="reset-info" id="resetInfo"></p>

    <section class="battlefield-box">
      <p class="subtitle">Today's active battlefield</p>
      <div class="battlefield-name" id="battlefieldName"></div>
      <p class="next" id="nextBattlefield"></p>
    </section>

    <section class="maps">
      <h2>Frontline battlefields</h2>
      <ul id="mapList"></ul>
    </section>

    <footer>
      Based on the Frontline rotation introduced in Patch 7.5 of the Dawntrail expansion, starting from April 28, 2026 after the 15:00 UTC reset, The Borderland Ruins (Secure) was active.
    </footer>
  </main>

  <script>
    const battlefields = [
      "Seal Rock (Seize)",
      "The Fields of Glory (Shatter)",
      "Onsal Hakair (Danshig Naadam)",
      "Worqor Chirteh (Triumph)",
      "Seal Rock (Seize)",
      "The Borderland Ruins (Secure)",
      "Onsal Hakair (Danshig Naadam)",
      "Worqor Chirteh (Triumph)"
    ];

    const battlefieldImages = {
      "Seal Rock (Seize)": "images/seal-rock.jpg",
      "The Fields of Glory (Shatter)": "images/fields-of-glory.jpg",
      "Onsal Hakair (Danshig Naadam)": "images/onsal-hakair.jpg",
      "Worqor Chirteh (Triumph)": "images/worqor-chirteh.jpg",
      "The Borderland Ruins (Secure)": "images/borderland-ruins.jpg"
    };

    const baseResetTimeUTC = Date.UTC(2026, 3, 28, 15, 0, 0);
    const baseIndex = 5;

    function getCurrentReset(date) {
      const resetHour = 15;

      const todayReset = Date.UTC(
        date.getUTCFullYear(),
        date.getUTCMonth(),
        date.getUTCDate(),
        resetHour
      );

      return date.getTime() < todayReset
        ? todayReset - 86400000
        : todayReset;
    }

    function getBattlefieldIndex(date) {
      const diffDays = Math.floor(
        (getCurrentReset(date) - baseResetTimeUTC) / 86400000
      );

      return (baseIndex + diffDays + battlefields.length) % battlefields.length;
    }

    function formatDate(date) {
      const weekday = date.toLocaleDateString("en-US", { weekday: "long" });
      const fullDate = date.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });

      return `${weekday} · ${fullDate}`;
    }

    function render() {
      const now = new Date();
      const index = getBattlefieldIndex(now);
      const next = (index + 1) % battlefields.length;
      const currentBattlefield = battlefields[index];

      document.getElementById("todayDate").textContent = formatDate(now);

      document.getElementById("resetInfo").textContent =
        "Daily reset: 15:00 UTC (automatically adjusted to New York time)";

      document.getElementById("battlefieldName").textContent = currentBattlefield;

      document.getElementById("nextBattlefield").textContent =
        "Next battlefield (after reset): " + battlefields[next];

      document.body.style.backgroundImage =
        `url('${battlefieldImages[currentBattlefield]}')`;

      const uniqueMaps = [
        "Seal Rock (Seize)",
        "The Fields of Glory (Shatter)",
        "Onsal Hakair (Danshig Naadam)",
        "Worqor Chirteh (Triumph)",
        "The Borderland Ruins (Secure)"
      ];

      const list = document.getElementById("mapList");
      list.innerHTML = "";

      uniqueMaps.forEach(map => {
        const li = document.createElement("li");
        li.textContent = map;

        if (map === currentBattlefield) {
          li.classList.add("today-map");
        }

        list.appendChild(li);
      });
    }

    render();
  </script>
</body>
</html>
